<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/style.css" />
  </head>
  <body>
    <h1>La mia Dashboard</h1>
    <section id="utenti">
      <h2>Utenti</h2>
      <button type="button" id="mostra-utenti">Mostra utenti</button>
      <button type="button" id="nascondi-utenti">Nascondi utenti</button>
      <form id="form-utenti">
        <input type="text" id="input-nome" placeholder="Nome" />
        <input type="email" id="input-email" placeholder="Email" />
        <input type="text" id="input-citta" placeholder="Città" />
        <button type="button" id="btn-agg">Aggiungi</button>
      </form>
      <div id="lista-utenti"></div>
    </section>

    <section id="post"></section>
    <section id="commenti"></section>
    <script src="./JS/script.js"></script>
  </body>
</html>
